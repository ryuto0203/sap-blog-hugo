<header>
  <div class="header-content container">
    <div class="logo">
      <a href="/" style="text-decoration: none; color: inherit;">SAP入門ナレッジ</a>
    </div>
    <button id="menu-toggle" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="nav-menu">
      <ul>
        <li><a href="/" {{ if .IsHome }}class="active"{{ end }}>ホーム</a></li>
        <li><a href="/what-is-sap/" {{ if eq .RelPermalink "/what-is-sap/" }}class="active"{{ end }}>SAPとは</a></li>
        <li><a href="/activate/" {{ if eq .RelPermalink "/activate/" }}class="active"{{ end }}>Activate</a></li>
        <li><a href="/cloud/" {{ if eq .RelPermalink "/cloud/" }}class="active"{{ end }}>S/4HANA Cloud</a></li>
        <li><a href="/faq/" {{ if eq .RelPermalink "/faq/" }}class="active"{{ end }}>FAQ</a></li>
        <li><a href="/blog/" {{ if hasPrefix .RelPermalink "/blog" }}class="active"{{ end }}>ブログ</a></li>
      </ul>
      <!-- スマホ用検索・フィルター -->
      <div class="mobile-search-area">
        <div class="search-box">
          <div class="search-input-wrap">
            <input type="text" id="mobile-search-input" class="search-input" placeholder="記事を検索..." autocomplete="off" />
            <span class="search-icon">🔍</span>
          </div>
          <div id="mobile-search-results" class="search-results" aria-live="polite"></div>
        </div>
        <div class="filter-select-wrap" style="margin-top: 0.75rem;">
          <select id="mobile-blog-filter-select" class="filter-select">
            <option value="all">すべての記事</option>
            <optgroup label="モジュール別">
              <option value="MM">📦 MM（在庫管理）</option>
              <option value="SD">📈 SD（販売流通）</option>
              <option value="PP">⚙️ PP（生産計画）</option>
              <option value="FI">💰 FI（財務会計）</option>
            </optgroup>
            <optgroup label="カテゴリ別">
              <option value="学習ガイド">📚 学習ガイド</option>
              <option value="導入事例">🏢 導入事例</option>
              <option value="技術解説">🔧 技術解説</option>
            </optgroup>
          </select>
        </div>
      </div>
    </nav>
  </div>
</header>
