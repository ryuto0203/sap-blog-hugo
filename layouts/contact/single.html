{{ define "main" }}
<section style="background-color: #f9fafb; padding: 2rem 0;">
  <div class="container">
    <h1>お問い合わせ</h1>
    <p style="color: var(--muted); font-size: 1.1rem;">ご質問・ご意見はこちらからお気軽にどうぞ</p>
  </div>
</section>

<section>
  <div class="container">
    <div style="max-width: 640px; margin: 0 auto;">

      <div class="card" style="margin-bottom: 2rem; background: var(--secondary); border: none;">
        <p style="margin: 0; color: var(--muted); font-size: 0.95rem;">
          📩 通常2〜3営業日以内にご返信いたします。<br>
          SAP学習に関するご質問もお気軽にどうぞ。
        </p>
      </div>

      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact/thanks/">
        <!-- Netlify Bot対策 -->
        <input type="hidden" name="form-name" value="contact" />
        <p style="display:none;">
          <label>Don't fill this out: <input name="bot-field" /></label>
        </p>

        <div class="form-group">
          <label for="name">お名前 <span style="color: var(--danger);">*</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" required />
        </div>

        <div class="form-group">
          <label for="email">メールアドレス <span style="color: var(--danger);">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>

        <div class="form-group">
          <label for="subject">件名 <span style="color: var(--danger);">*</span></label>
          <input type="text" id="subject" name="subject" placeholder="SAP学習についての質問" required />
        </div>

        <div class="form-group">
          <label for="message">メッセージ <span style="color: var(--danger);">*</span></label>
          <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
          送信する
        </button>
      </form>
    </div>
  </div>
</section>
{{ end }}
