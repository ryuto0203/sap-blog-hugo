{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-hero-desc">{{ . }}</p>{{ end }}
  </div>
</section>

<section>
  <div class="container">
    <div class="content-wrapper">
      <article>
        {{ .Content }}
      </article>
    </div>
  </div>
</section>
{{ end }}
