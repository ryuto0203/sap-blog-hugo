{{ define "main" }}
<section style="background-color: #f9fafb; padding: 2rem 0;">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>

<section>
  <div class="container">
    <div class="grid grid-2" style="gap: 2rem;">
      {{ range .Pages }}
      {{ if not .Draft }}
      <div class="card blog-post">
        {{ with .Params.categories }}
        <div style="background-color: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 4px; display: inline-block; margin-bottom: 1rem; font-size: 0.875rem;">{{ index . 0 }}</div>
        {{ end }}
        <h3 class="card-title">{{ .Title }}</h3>
        <p class="card-description">{{ .Summary }}</p>
        <p style="color: var(--muted); font-size: 0.875rem;">{{ .Date.Format "2006年1月2日" }}</p>
        <a href="{{ .RelPermalink }}" style="color: var(--primary); font-weight: 600;">続きを読む →</a>
      </div>
      {{ end }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
