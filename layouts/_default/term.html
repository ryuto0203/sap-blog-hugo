{{ define "main" }}
<section style="background-color: #f9fafb; padding: 2rem 0;">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <p style="color: var(--muted);">このカテゴリの記事一覧</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="grid grid-2" style="gap: 2rem;">
      {{ range .Pages }}
      {{ if not .Draft }}
      <div class="card blog-post">
        <h3 class="card-title">{{ .Title }}</h3>
        <p class="card-description">{{ .Summary }}</p>
        <p style="color: var(--muted); font-size: 0.875rem;">{{ .Date.Format "2006年1月2日" }}</p>
        <a href="{{ .RelPermalink }}" style="color: var(--primary); font-weight: 600;">続きを読む →</a>
      </div>
      {{ end }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
