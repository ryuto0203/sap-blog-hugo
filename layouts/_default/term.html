{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <p class="page-hero-desc">「{{ .Title }}」の記事一覧</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="post-list">
      {{ range .Pages }}
      {{ if not .Draft }}
      <article class="post-list-item">
        <div class="post-list-meta">
          {{ with .Params.categories }}
          <span class="category-badge category-badge-{{ index . 0 | urlize }}">{{ index . 0 }}</span>
          {{ end }}
        </div>
        <h3 class="post-list-title">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h3>
        <div class="post-list-foot">
          {{ with .Params.author }}<span class="post-list-author">{{ . }}</span>{{ end }}
          <span class="post-list-date">投稿: {{ .Date.Format "2006年1月2日" }}</span>
        </div>
      </article>
      {{ end }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
